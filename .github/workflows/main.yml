name: Run Bot

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v2

    - name: Set up Python 3.11
      uses: actions/setup-python@v2
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Stockfish 17
      run: |
        sudo apt-get update
        sudo apt-get install -y wget unzip
        wget https://github.com/official-stockfish/Stockfish/releases/download/stockfish-dev-20250213-fa6c30af/stockfish-ubuntu-x86-64-bmi2.tar  # Đảm bảo URL đúng cho Linux
        unzip stockfish-ubuntu-x86-64-bmi2.tar
        sudo mv stockfish /usr/local/bin/stockfish  # Di chuyển Stockfish vào thư mục bin để sử dụng

    - name: Run the bot
      env:
        LICHESS_API_KEY: ${{ secrets.LICHESS_API_KEY }}  # Thêm API Key của bạn vào GitHub Secrets
      run: |
        python user_interface.py --matchmaking  # Chạy lệnh mới với đối số --matchmaking
