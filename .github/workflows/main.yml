        tar -xvf stockfish-ubuntu-x86-64-bmi2.tar  # Sử dụng tar để giải nén
        sudo mv stockfish /usr/local/bin/stockfish  # Di chuyển Stockfish vào thư mục bin để sử dụng
        mkdir -p ./engines  # Tạo thư mục engines nếu chưa có
        mv stockfish ./engines/stockfish-ubuntu-x86-64-bmi2.tar  # Di chuyển Stockfish vào thư mục engines

